# Graph extraction prompt templates
# Used for knowledge graph entity and relationship extraction
templates:
  - id: "default_extract_entities"
    name: "Entity Extraction"
    description: "Extract entities from text for knowledge graph construction"
    default: true
    content: |
      ## 任务
      从用户提供的文本中提取符合下列实体类型的全部实体：
      EntityTypes: [Person, Organization, Location, Product, Event, Date, Work, Concept, Resource, Category, Operation]

      ## 要求
      1. 输出必须为 JSON 数组格式
      2. 每个实体必须包含 title 与 type 字段；description 可选但强烈建议填写
      3. type 取值必须严格选自 EntityTypes 列表，不得自创类型
      4. 无法判断实体类型时不要强行归类，宁可跳过该实体
      5. 不要输出任何解释或其他内容，只输出 JSON 数组
      6. 所有字段值不得包含 HTML 标签或其他代码
      7. 若实体有歧义，请在 description 中说明指代
      8. 若未找到实体，返回空数组 []

      ## 实体抽取规则
      - Person：真实或虚构人物，包括历史人物、当代人物、文学角色等
      - Organization：公司、政府机构、团队、学校等组织实体
      - Location：地理位置、地标、国家、城市等
      - Product：商品、服务、品牌等商业产品
      - Event：事件、会议、节日、历史事件等
      - Date：日期、时段、年代等时间相关信息
      - Work：书籍、电影、音乐、艺术品等创作作品
      - Concept：抽象概念、思想、理论等
      - Resource：自然资源、信息资源、工具等
      - Category：分类、类别、领域等
      - Operation：操作、动作、方法、流程等

      ## 抽取步骤
      1. 仔细阅读文本，识别潜在实体
      2. 为每个实体确定最合适的类型（必须选自 EntityTypes）
      3. 为每个实体创建含以下字段的 JSON 对象：
         - title：实体标准名称，不含引号等修饰
         - type：选自 EntityTypes 的实体类型
         - description：基于文本内容的简要描述，语言与源文本一致
      4. 核对每个实体字段正确且格式规范
      5. 将所有实体对象合并为单个 JSON 数组
      6. 检查最终 JSON 合法且符合要求

      ## 关键：语言规则
      - 实体 title 须与源文本中出现的写法一致
      - description 使用 {{language}} 撰写

      ## 示例
      [输入]
      文本：《红楼梦》是曹雪芹创作的长篇章回小说，代表了中国古典小说的最高成就。故事以贾宝玉、林黛玉、薛宝钗的爱情婚姻悲剧为主线，描写了贾、史、王、薛四大家族的兴衰。故事主要发生在大观园。

      [输出]
      [
        {
          "title": "红楼梦",
          "type": "Work",
          "description": "曹雪芹创作的长篇章回小说，代表中国古典小说最高成就"
        },
        {
          "title": "曹雪芹",
          "type": "Person",
          "description": "《红楼梦》的作者"
        },
        {
          "title": "贾宝玉",
          "type": "Person",
          "description": "《红楼梦》男主角之一"
        },
        {
          "title": "林黛玉",
          "type": "Person",
          "description": "《红楼梦》女主角之一"
        },
        {
          "title": "薛宝钗",
          "type": "Person",
          "description": "《红楼梦》女主角之一"
        },
        {
          "title": "大观园",
          "type": "Location",
          "description": "《红楼梦》故事主要发生地"
        }
      ]


  - id: "default_extract_relationships"
    name: "Relationship Extraction"
    description: "Extract relationships between entities for knowledge graph construction"
    default: true
    content: |
      ## 任务
      基于用户提供的实体数组，抽取实体之间的显式关系，形成结构化关系网络。

      ## 要求
      1. 关系抽取必须依据所给文本内容，不得编造不存在的关系
      2. 输出必须为 JSON 数组，每个关系为数组中的一个对象
      3. 每个关系对象必须包含 source、target、description、strength 字段
      4. 不要输出任何解释或其他内容，只输出 JSON 数组
      5. 若未找到关系，返回空数组 []

      ## 关系抽取规则
      - 仅抽取文本中明确出现的关系
      - source 与 target 必须是实体数组中已有的实体
      - description 应简洁说明两实体间的具体关系
      - strength 按下列标准判定：
        * 10：直接创建/从属关系（如作者与作品、发明者与发明、母公司与子公司）
        * 9：同一实体的不同表现形式（如别名、曾用名）
        * 8：紧密相关且相互影响（如密切合作伙伴、家庭成员）
        * 7：明确但间接的关系（如作品中的角色、组织成员）
        * 6：有明确关联的间接关系（如同事、同类产品）
        * 5：相关但联系较弱（如同一领域的不同概念）

      ## 输出字段说明
      - source：关系起点实体的 title（须与实体数组中的 title 完全一致）
      - target：关系终点实体的 title（须与实体数组中的 title 完全一致）
      - description：关系的简要中文/目标语言描述
      - strength：1–10 的整数强度

      ## 关键：语言规则
      - description 使用 {{language}} 撰写

      ## 示例
      [输入实体]
      [
        {"title": "红楼梦", "type": "Work"},
        {"title": "曹雪芹", "type": "Person"},
        {"title": "贾宝玉", "type": "Person"}
      ]
      [输入文本]
      《红楼梦》是曹雪芹创作的长篇小说。贾宝玉是书中主要人物。

      [输出]
      [
        {
          "source": "曹雪芹",
          "target": "红楼梦",
          "description": "曹雪芹创作了《红楼梦》",
          "strength": 10
        },
        {
          "source": "贾宝玉",
          "target": "红楼梦",
          "description": "贾宝玉是《红楼梦》中的主要人物",
          "strength": 7
        }
      ]
