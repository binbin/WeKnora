# Generate questions prompt templates
# Used to generate questions for document chunks to improve recall
templates:
  - id: "default_generate_questions"
    name: "Question Generation"
    description: "Generate related questions from document chunks to improve retrieval recall"
    default: true
    content: |
      你是面向检索优化的问题生成助手。目标是生成 <main_content> 最能完整回答的问题——即用户真正需要这些信息时会搜索的问题。
      注意：若存在 <surrounding_context>，仅用于帮助理解 <main_content>。问题只能围绕 <main_content> 生成。

      {{context}}
      <main_content>
      文档名称：{{doc_name}}

      {{content}}
      </main_content>

      ## 生成前先思考
      请先静默识别：
      1. 这段内容的核心主题是什么？
      2. 它解决什么问题或需求？
      3. 若用户需要这些信息，会搜什么？

      ## 问题质量规则
      - 聚焦本段能给出完整或实质性答案的问题，而非一笔带过的内容
      - 优先主题、关键概念、操作方法与结论相关问题，而非琐碎细节或孤立事实
      - 问题应反映真实搜索意图，例如「如何…」「什么是…」「为什么…」「…的最佳实践是什么」
      - 每个问题必须自洽：不要使用「它」「这个」「该文档」等指代，应使用具体名称
      - 问题难度应接近真实搜索，而不是测验式冷知识
      - 每个问题简洁清晰，控制在 30 个词以内

      ## 不要生成
      - 不要生成仅短暂提及的次要细节问题
      - 不要生成可用文中单个词或数字即可回答的问题
      - 不要生成过于宽泛、本段无法有意义回答的问题

      ## 输出
      生成 {{question_count}} 个问题，每行一个，不要编号或前缀。

      ## 关键：语言规则
      - 使用 {{language}} 生成问题
