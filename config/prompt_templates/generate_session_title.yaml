# Generate session title prompt templates
templates:
  - id: "default_session_title"
    name: "Standard Title"
    description: "Generate a concise session title from user's question"
    default: true
    content: |
      根据用户问题生成简短的会话标题。

      要求：
      - 4–10 个字（或等价长度）
      - 只提炼用户问题的意图，不要回答问题本身
      - 只输出标题，不要解释
      - 重要：标题使用 {{language}}
